services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup
      POSTGRES_DB: worldcup
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup -d worldcup"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://worldcup:worldcup@postgres:5432/worldcup
      ODDS_API_KEY: ${ODDS_API_KEY:-replace_me}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-replace_me}
      SESSION_SECRET: ${SESSION_SECRET:-replace_me}
      APP_BASE_URL: ${APP_BASE_URL:-https://pool.joseathie.com}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      TIMEZONE: ${TIMEZONE:-America/Mexico_City}
      EXPORT_DIR: /app/exports
    volumes:
      - export_files:/app/exports
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""
        ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

volumes:
  postgres_data:
  export_files:
