services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup
      POSTGRES_DB: worldcup
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup -d worldcup"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://worldcup:worldcup@postgres:5432/worldcup
      ODDS_API_KEY: ${ODDS_API_KEY:-replace_me}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-replace_me}
      SESSION_SECRET: ${SESSION_SECRET:-replace_me}
      APP_BASE_URL: ${APP_BASE_URL:-https://pool.joseathie.com}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      TIMEZONE: ${TIMEZONE:-America/Mexico_City}
      EXPORT_DIR: /app/exports
    volumes:
      - export_files:/app/exports
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""
        ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    # Explicit Traefik routing for Coolify's reverse proxy.
    # Coolify reliably generates the router + TLS labels for the configured
    # domain but often FAILS to emit the loadbalancer.server.port label for
    # Docker Compose services, leaving Traefik with a route that has no backend
    # port -> it answers "404 page not found". We declare the full router +
    # service here (with high priority so it wins over Coolify's port-less
    # router) so routing is deterministic. Replace the host with your domain.
    labels:
      - traefik.enable=true
      # HTTPS router
      - "traefik.http.routers.frontend-pool-https.rule=Host(`pool.joseathie.com`)"
      - traefik.http.routers.frontend-pool-https.entryPoints=https
      - traefik.http.routers.frontend-pool-https.tls=true
      - traefik.http.routers.frontend-pool-https.tls.certresolver=letsencrypt
      - traefik.http.routers.frontend-pool-https.service=frontend-pool
      - traefik.http.routers.frontend-pool-https.priority=1000
      # HTTP router -> redirect to HTTPS
      - "traefik.http.routers.frontend-pool-http.rule=Host(`pool.joseathie.com`)"
      - traefik.http.routers.frontend-pool-http.entryPoints=http
      - traefik.http.routers.frontend-pool-http.middlewares=frontend-pool-redirect
      - traefik.http.routers.frontend-pool-http.priority=1000
      - traefik.http.middlewares.frontend-pool-redirect.redirectscheme.scheme=https
      # Service -> the label Coolify fails to generate: forward to nginx port 80
      - traefik.http.services.frontend-pool.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  export_files:
