name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    name: Backend (pytest + type check)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: worldcup
          POSTGRES_PASSWORD: worldcup
          POSTGRES_DB: worldcup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://worldcup:worldcup@localhost:5432/worldcup_test
          ADMIN_PASSWORD: testpass
          SESSION_SECRET: test-secret-32-chars-minimum-here
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://worldcup:worldcup@localhost:5432/worldcup_test
          ADMIN_PASSWORD: testpass
          SESSION_SECRET: test-secret-32-chars-minimum-here
        run: pytest tests/ -v --tb=short

  frontend:
    name: Frontend (tsc + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    # Only deploy on direct pushes to the production branch, and only
    # after both CI jobs pass (a failed `needs` job skips this one).
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/claude/world-cup-pool-optimizer-dXYWi'

    steps:
      - name: Trigger Coolify deploy webhook
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK_URL" ] || [ -z "$COOLIFY_API_TOKEN" ]; then
            echo "::error::COOLIFY_WEBHOOK_URL and COOLIFY_API_TOKEN secrets must be set in the repository settings."
            exit 1
          fi
          http_code=$(curl -sS -o /tmp/coolify_response.txt -w "%{http_code}" \
            --request GET "$COOLIFY_WEBHOOK_URL" \
            --header "Authorization: Bearer $COOLIFY_API_TOKEN")
          echo "Coolify responded with HTTP $http_code"
          cat /tmp/coolify_response.txt
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Coolify webhook returned HTTP $http_code"
            exit 1
          fi
