name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    name: Backend (pytest + type check)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: worldcup
          POSTGRES_PASSWORD: worldcup
          POSTGRES_DB: worldcup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://worldcup:worldcup@localhost:5432/worldcup_test
          ADMIN_PASSWORD: testpass
          SESSION_SECRET: test-secret-32-chars-minimum-here
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://worldcup:worldcup@localhost:5432/worldcup_test
          ADMIN_PASSWORD: testpass
          SESSION_SECRET: test-secret-32-chars-minimum-here
        run: pytest tests/ -v --tb=short

  frontend:
    name: Frontend (tsc + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
