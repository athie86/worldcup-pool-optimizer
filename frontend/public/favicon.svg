<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="World Cup Pool Optimizer">
  <defs>
    <linearGradient id="f_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3fb3"/>
      <stop offset="100%" stop-color="#0a1f63"/>
    </linearGradient>
    <linearGradient id="f_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#D9A300"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#f_bg)"/>

  <!-- Trophy stem + base -->
  <rect x="18" y="50" width="18" height="5" rx="1" fill="url(#f_gold)"/>
  <rect x="20" y="46" width="14" height="4" rx="1" fill="url(#f_gold)"/>
  <path d="M 22 46 L 23 36 L 31 36 L 32 46 Z" fill="url(#f_gold)"/>

  <!-- Trophy body -->
  <path d="M 21 36 C 16 30, 14 24, 16 18 C 17 14, 20 12, 23 11 L 23 16 C 22 17, 21 19, 21 22 C 21 27, 23 32, 25 36 Z" fill="url(#f_gold)"/>
  <path d="M 33 36 C 38 30, 40 24, 38 18 C 37 14, 34 12, 31 11 L 31 16 C 32 17, 33 19, 33 22 C 33 27, 31 32, 29 36 Z" fill="url(#f_gold)"/>

  <!-- Globe top -->
  <circle cx="27" cy="11" r="8" fill="url(#f_gold)"/>
  <circle cx="27" cy="11" r="8" fill="none" stroke="#0a1f63" stroke-width="0.8" opacity="0.6"/>
  <path d="M 21 9 Q 27 6 33 9 M 21 13 Q 27 16 33 13" stroke="#0a1f63" stroke-width="0.7" fill="none" opacity="0.6"/>

  <!-- Bar chart -->
  <rect x="38" y="38" width="5" height="12" rx="0.8" fill="url(#f_gold)"/>
  <rect x="45" y="32" width="5" height="18" rx="0.8" fill="url(#f_gold)"/>
  <rect x="52" y="24" width="5" height="26" rx="0.8" fill="url(#f_gold)"/>

  <!-- Arrow -->
  <polyline points="9,46 18,42 28,37 38,32 48,26 57,18"
            fill="none" stroke="url(#f_gold)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="57,18 50,20 53,25" fill="url(#f_gold)"/>
  <polygon points="57,18 53,13 50,20" fill="url(#f_gold)"/>
</svg>
