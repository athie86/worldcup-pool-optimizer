<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="World Cup Pool Optimizer mark">
  <defs>
    <linearGradient id="m_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3fb3"/>
      <stop offset="55%" stop-color="#0f2d8a"/>
      <stop offset="100%" stop-color="#0a1f63"/>
    </linearGradient>
    <linearGradient id="m_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#F1BF00"/>
      <stop offset="100%" stop-color="#C99500"/>
    </linearGradient>
    <linearGradient id="m_arrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#F1BF00"/>
      <stop offset="100%" stop-color="#FFE066"/>
    </linearGradient>
    <radialGradient id="m_globe" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#FFE680"/>
      <stop offset="60%" stop-color="#F1BF00"/>
      <stop offset="100%" stop-color="#A87800"/>
    </radialGradient>
    <clipPath id="m_globeClip">
      <circle cx="195" cy="135" r="60"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#m_bg)"/>

  <!-- Halo ring -->
  <path d="M 90 175 A 135 145 0 1 1 355 180"
        fill="none" stroke="url(#m_gold)" stroke-width="10" stroke-linecap="round"/>

  <!-- Trophy base -->
  <rect x="155" y="410" width="120" height="22" rx="4" fill="url(#m_gold)"/>
  <rect x="167" y="392" width="96" height="18" rx="3" fill="url(#m_gold)"/>

  <!-- Trophy stem -->
  <path d="M 188 392 L 198 312 L 232 312 L 242 392 Z" fill="url(#m_gold)"/>

  <!-- Trophy curves -->
  <path d="M 180 312
           C 168 282, 156 252, 156 222
           C 156 192, 174 168, 198 153
           L 198 188
           C 189 197, 185 209, 185 224
           C 185 248, 193 275, 204 302 Z"
        fill="url(#m_gold)"/>
  <path d="M 250 312
           C 262 282, 274 252, 274 222
           C 274 192, 256 168, 232 153
           L 232 188
           C 241 197, 245 209, 245 224
           C 245 248, 237 275, 226 302 Z"
        fill="url(#m_gold)"/>

  <!-- Globe -->
  <circle cx="195" cy="135" r="60" fill="url(#m_globe)"/>
  <g clip-path="url(#m_globeClip)" fill="#0f2d8a" opacity="0.85">
    <path d="M 152 105 C 152 100, 159 96, 167 97 C 175 98, 178 106, 176 115 C 174 124, 170 131, 163 134 C 159 135, 156 133, 153 128 C 150 121, 149 112, 152 105 Z"/>
    <path d="M 165 154 C 167 158, 170 163, 170 171 C 170 179, 167 187, 163 192 C 161 195, 158 195, 156 192 C 153 184, 153 173, 158 165 C 161 159, 163 155, 165 154 Z"/>
    <path d="M 193 108 C 197 105, 203 106, 206 110 C 208 114, 207 118, 204 120 C 207 123, 209 127, 209 133 C 208 139, 204 145, 199 150 C 195 153, 191 156, 188 153 C 186 149, 188 144, 191 139 C 192 135, 191 131, 190 127 C 188 121, 190 113, 193 108 Z"/>
    <path d="M 215 105 C 224 102, 234 105, 238 113 C 240 119, 238 126, 233 129 C 227 133, 221 130, 216 125 C 213 122, 213 115, 215 105 Z"/>
    <path d="M 227 153 C 233 151, 240 155, 242 161 C 243 166, 239 169, 234 169 C 228 169, 224 166, 224 161 C 224 158, 225 154, 227 153 Z"/>
  </g>
  <ellipse cx="174" cy="115" rx="20" ry="11" fill="#FFE680" opacity="0.35"/>

  <!-- Bar chart -->
  <rect x="270" y="345" width="30" height="72" rx="3" fill="url(#m_gold)"/>
  <rect x="306" y="305" width="30" height="112" rx="3" fill="url(#m_gold)"/>
  <rect x="342" y="255" width="30" height="162" rx="3" fill="url(#m_gold)"/>
  <rect x="378" y="200" width="30" height="217" rx="3" fill="url(#m_gold)"/>

  <!-- Arrow line -->
  <g fill="none" stroke="url(#m_arrow)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="78,388 138,350 200,318 280,290 340,247 405,180"/>
  </g>
  <polygon points="405,180 372,184 388,202" fill="url(#m_arrow)"/>
  <polygon points="405,180 388,162 372,184" fill="url(#m_arrow)"/>
  <circle cx="78" cy="388" r="11" fill="url(#m_gold)"/>
  <circle cx="78" cy="388" r="5" fill="#0f2d8a"/>
</svg>
